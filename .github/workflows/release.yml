name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3)"
        required: true
        type: string

env:
  GO_VERSION: "1.21"
  CGO_ENABLED: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_STRIPPED=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        run: go test -v -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/mcp-server-linux-amd64 ./cmd/mcp-server

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/mcp-server-linux-arm64 ./cmd/mcp-server

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/mcp-server-darwin-amd64 ./cmd/mcp-server

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/mcp-server-darwin-arm64 ./cmd/mcp-server

          # Windows AMD64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/mcp-server-windows-amd64.exe ./cmd/mcp-server

          ls -la dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create archive
        run: |
          cd dist
          tar -czf mcp-server-${{ steps.version.outputs.VERSION_STRIPPED }}-linux-amd64.tar.gz mcp-server-linux-amd64
          tar -czf mcp-server-${{ steps.version.outputs.VERSION_STRIPPED }}-linux-arm64.tar.gz mcp-server-linux-arm64
          tar -czf mcp-server-${{ steps.version.outputs.VERSION_STRIPPED }}-darwin-amd64.tar.gz mcp-server-darwin-amd64
          tar -czf mcp-server-${{ steps.version.outputs.VERSION_STRIPPED }}-darwin-arm64.tar.gz mcp-server-darwin-arm64
          zip mcp-server-${{ steps.version.outputs.VERSION_STRIPPED }}-windows-amd64.zip mcp-server-windows-amd64.exe
          rm -f mcp-server-*-amd64 mcp-server-*-arm64 mcp-server-*.exe
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'workflow_dispatch'
        with:
          draft: true
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: actions/upload-release-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: ${{ contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') }}
          files: |
            dist/*